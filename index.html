<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Portfólio | Érica Ribeiro </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>
  <span id="texto"></span><span class="cursor">|</span>
</h1>
        <nav>
            <ul>
                <li><a href="#sobre">Sobre Mim</a></li>
                <li><a href="#projetos">Projetos</a></li>
                <li><a href="#contato">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="sobre">
           <img src="perfil.jpeg" alt="Foto">

           <div class="sobre-texto">
             <h2>Sobre Mim</h2>
             <p>Sou discente do curso Tecnologia em Sistemas para Internet e apaixonada por tecnologia e inovação.</p>
           </div>
    
        </section>

        <section id="projetos">
            <h2>Meus Projetos</h2>
            <div class="projetos-container"> 
            </div>
        </section>
        <section id="contato">
            <h2>Contato</h2>
            <form action="#" method="post" id="meu-formulario">
                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text"  id="nome" required>
                </div>
               <div class="campo">
                    <label for="email">E-mail:</label>
                   <input type="email" id="email" required>
               </div>
            <div class="campo">        
                   <label for="msg">Mensagem:</label>
                   <textarea id="msg"></textarea>
            </div>
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 - Desenvolvido por Érica Ribeiro</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
